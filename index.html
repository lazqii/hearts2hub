<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hearts2Hub</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- Header & Navigation -->
    <header class="glass-header">
        <div class="header-top">
            <h1 class="logo">
                <img src="./assets/img/logo.jpg" alt="Hearts2Hearts" class="logo-img">
                <div class="logo-text">Hearts<span>2Hub</span></div>
            </h1>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                <i data-lucide="moon"></i>
            </button>
        </div>

        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-input" placeholder="Search episodes, moments, etc...">
        </div>

        <!-- Scrollable Category Filters (Generated by JS) -->
        <div class="filter-scroll-wrapper">
            <div id="filter-container" class="filter-container">
                <!-- Buttons will be injected here -->
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Results Counter -->
        <div class="results-info">
            <span id="result-count">0 Videos Found</span>
        </div>

        <!-- Video Grid -->
        <section id="video-grid" class="video-grid">
            <!-- Video Cards will be injected here -->
        </section>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
            <i data-lucide="ghost"></i>
            <h3>Oops, no videos found!</h3>
            <p>Try using different keywords.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <img src="./assets/img/logo.jpg" alt="Hearts2Hub Logo" class="footer-logo">
                <div class="footer-brand-text">Hearts<span>2Hub</span></div>
            </div>
            <p class="footer-desc">An unofficial curated video archive dedicated to the journey of Hearts2Hearts. Built
                with passion for the fans.</p>

            <div class="footer-links">
                <a href="https://www.tiktok.com/@lazqii" target="_blank" rel="noopener noreferrer" class="social-link"
                    title="Follow me on TikTok">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path
                            d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z" />
                    </svg>
                    <span>TikTok</span>
                </a>
                <a href="https://saweria.co/lazqii" target="_blank" rel="noopener noreferrer" class="donate-link"
                    title="Support the developer">
                    <i data-lucide="coffee"></i>
                    <span>Support Me</span>
                </a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Hearts2Hub. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal Player Player YouTube -->
    <div id="video-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Video Player</h3>
                <button id="close-modal" class="icon-btn close-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="video-wrapper">
                <iframe id="youtube-player" src="" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
    <script>
        // Inisialisasi Icons
        lucide.createIcons();
    </script>
</body>

</html>
